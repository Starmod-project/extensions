services:
  - type: web
    name: turbowarp-extensions
    env: node
    plan: free
    # 依存関係のインストール（npm install）をスキップします
    buildCommand: ""
    # サーバーを直接起動
    startCommand: npm start
    # TurboWarp用のCORS設定
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
